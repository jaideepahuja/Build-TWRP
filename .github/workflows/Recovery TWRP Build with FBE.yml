name: Recovery TWRP Build with FBE

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'MANIFEST_URL (if want to use SSH keys, use git@github.com:XXXXX)'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp'

      MANIFEST_BRANCH:
        description: 'MANIFEST_BRANCH'
        required: true
        default: 'twrp-11'

      DEVICE_TREE_URL:
        description: 'DEVICE_TREE_URL'
        required: true
        default: 'https://github.com/SUFandom/A12-Exynos-recovery-devtree'

      DEVICE_TREE_BRANCH:
        description: 'DEVICE_TREE_BRANCH'
        required: true
        default: 'UA-aug-fbe'

      DEVICE_PATH:
        description: 'DEVICE_PATH'
        required: true
        default: 'device/samsung/a12s'

      COMMON_TREE_URL:
        description: 'COMMON_TREE_URL (if no common tree, leave blank)'
        required: false

      COMMON_PATH:
        description: 'COMMON_PATH (if no common tree, leave blank)'
        required: false

      DEVICE_NAME:
        description: 'DEVICE_NAME'
        required: true
        default: 'a12s'

      MAKEFILE_NAME:
        description: 'MAKEFILE_NAME'
        required: true
        default: 'twrp_a12s'

      BUILD_TARGET:
        description: 'BUILD_TARGET'
        required: true
        default: 'recovery'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - name: Display Run Parameters
        run: |
          echo "::group::User Environment Variables"
          echo "Manifest URL: ${{ github.event.inputs.MANIFEST_URL }}"
          echo "Manifest Branch: ${{ github.event.inputs.MANIFEST_BRANCH }}"
          echo "Device Tree URL: ${{ github.event.inputs.DEVICE_TREE_URL }}"
          echo "Device Tree Branch: ${{ github.event.inputs.DEVICE_TREE_BRANCH }}"
          echo "Device Path: ${{ github.event.inputs.DEVICE_PATH }}"
          echo "Device Name: ${{ github.event.inputs.DEVICE_NAME }}"
          echo "Makefile Name: ${{ github.event.inputs.MAKEFILE_NAME }}"
          echo "Build Target: ${{ github.event.inputs.BUILD_TARGET }}.img"
          echo "::endgroup::"

      - name: Check Out
        uses: actions/checkout@v4

      - name: Cleanup
        uses: rokibhasansagar/slimhub_actions@main

      - name: Prepare the environment
        run: |
          sudo apt update
          sudo apt install -y \
            bc \
            bison \
            build-essential \
            ccache \
            curl \
            flex \
            g++-multilib \
            gcc-multilib \
            gcc-10-multilib \
            g++-10-multilib \
            gperf \
            git \
            git-lfs \
            gnupg \
            imagemagick \
            lib32readline-dev \
            lib32z1-dev \
            libc6-dev \
            libgl1-mesa-dev \
            liblz4-tool \
            libncurses-dev \
            libstdc++-10-dev \
            libsdl1.2-dev \
            libssl-dev \
            libxml2 \
            libxml2-dev \
            libxml2-utils \
            lzop \
            ncftp \
            pngcrush \
            python3 \
            qemu-user-static \
            rsync \
            schedtool \
            squashfs-tools \
            tree \
            unzip \
            x11proto-core-dev \
            libx11-dev \
            xsltproc \
            zip \
            zlib1g-dev

      - name: Install OpenJDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup SSH Keys
        if: ${{ startsWith(github.event.inputs.MANIFEST_URL, 'git@github.com') }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Install repo
        run: |
          mkdir -p ~/bin
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Initialize repo
        id: pwd
        run: |
          mkdir workspace
          cd workspace
          echo "workspace-folder=$(pwd)" >> "$GITHUB_OUTPUT"

          git config --global user.email "arthk3220@gmail.com"
          git config --global user.name "HayateDevTH"

          repo init --depth=1 \
            -u "${{ github.event.inputs.MANIFEST_URL }}" \
            -b "${{ github.event.inputs.MANIFEST_BRANCH }}"

      - name: Repo Sync
        working-directory: workspace
        run: |
          repo sync -c --force-sync --no-clone-bundle --no-tags -j$(nproc)

      - name: Clone device tree
        working-directory: ${{ steps.pwd.outputs.workspace-folder }}
        run: |
          git clone \
            "${{ github.event.inputs.DEVICE_TREE_URL }}" \
            -b "${{ github.event.inputs.DEVICE_TREE_BRANCH }}" \
            "./${{ github.event.inputs.DEVICE_PATH }}"

      - name: Clone common tree
        if: ${{ github.event.inputs.COMMON_TREE_URL != '' && github.event.inputs.COMMON_PATH != '' }}
        working-directory: ${{ steps.pwd.outputs.workspace-folder }}
        run: |
          git clone \
            "${{ github.event.inputs.COMMON_TREE_URL }}" \
            -b "${{ github.event.inputs.DEVICE_TREE_BRANCH }}" \
            "./${{ github.event.inputs.COMMON_PATH }}"

      - name: Check Build Tree
        id: buildtree
        uses: haya14busa/action-cond@v1
        with:
          cond: ${{ github.event.inputs.MANIFEST_BRANCH == 'twrp-11' || github.event.inputs.MANIFEST_BRANCH == 'twrp-12.1' }}
          if_true: twrp
          if_false: omni

      - name: Sync Device Dependencies
        continue-on-error: true
        working-directory: ${{ steps.pwd.outputs.workspace-folder }}
        run: |
          bash ${GITHUB_WORKSPACE}/scripts/convert.sh \
          ${{ github.event.inputs.DEVICE_PATH }}/${{ steps.buildtree.outputs.value }}.dependencies

          repo sync -c --force-sync --no-clone-bundle --no-tags -j$(nproc)

      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Build Recovery
        working-directory: ${{ steps.pwd.outputs.workspace-folder }}
        run: |
          source build/envsetup.sh

          export ALLOW_MISSING_DEPENDENCIES=true

          lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng

          make clean

          make ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc)

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.run_id }}
          name: ${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }} with FBE

          body: |
            Manifest: ${{ github.event.inputs.MANIFEST_BRANCH }}
            Device: ${{ github.event.inputs.DEVICE_NAME }}
            Target: ${{ github.event.inputs.BUILD_TARGET }}.img

          files: |
            workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ github.event.inputs.BUILD_TARGET }}.img
            workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.zip
            workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*vendor*.img

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
